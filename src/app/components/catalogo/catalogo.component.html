<div class="buscador-wrapper">
  <input
    type="text"
    placeholder="Buscar producto..."
    class="buscador"
    [ngModel]="searchTerm()"
    (ngModelChange)="searchTerm.set($event)"
  />
  @if (searchTerm()) {
    <button class="limpiar" (click)="searchTerm.set('')">✕</button>
  }
</div>

<div class="categorias">
  <button
    class="cat-btn"
    [class.activo]="selectedCategory() === ''"
    (click)="selectedCategory.set('')"
  >Todas</button>
  @for (cat of categories(); track cat) {
    @if (cat) {
      <button
        class="cat-btn"
        [class.activo]="selectedCategory() === cat"
        (click)="selectedCategory.set(cat)"
      >{{ cat }}</button>
    }
  }
</div>

<h2>Catálogo</h2>
<div class="productos-grid">
  @for (product of filteredProducts(); track product.id) {
    <app-producto [product]="product" />
  } @empty {
    <p class="sin-resultados">No se encontraron productos para "{{ searchTerm() }}"</p>
  }
</div>
